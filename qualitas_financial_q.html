<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀄리타스반도체 분기 재무 데이터</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f8f9fa;
    color: #333;
}
.container {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 500px;
}
h2 {
    color: #1a1a1a;
    margin-bottom: 8px;
    font-size: 20px;
}
.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 24px;
}
.info {
    color: #888;
    font-size: 13px;
    line-height: 1.8;
}
.icon {
    font-size: 48px;
    margin-bottom: 16px;
}
a {
    color: #0066cc;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
<div class="icon">&#128202;</div>
<h2>퀄리타스반도체</h2>
<p class="subtitle">분기 재무 데이터가 DART 공시 시스템에 아직 등록되지 않았습니다.</p>
<p class="info">
DART(전자공시시스템)에 해당 기업의 분기 재무제표가<br>
아직 공시되지 않았거나, 조회 가능 기간이 아닙니다.<br><br>
사업보고서 공시 후 자동 업데이트됩니다.
</p>
</div>
</body>
</html>
