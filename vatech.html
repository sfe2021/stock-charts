<script>
(function() {
    var gd = document.querySelectorAll('.plotly-graph-div')[0];
    if (!gd) return;

    var fitting = false;

    function autofit(ed) {
        if (fitting) return;
        fitting = true;

        try {
            var xRange = gd.layout.xaxis && gd.layout.xaxis.range;
            if (!xRange) { fitting = false; return; }
            var xMin = new Date(xRange[0]);
            var xMax = new Date(xRange[1]);

            var traces = gd.data;
            var yMin = Infinity, yMax = -Infinity;
            var vMax = 0;

            for (var t = 0; t < traces.length; t++) {
                var trace = traces[t];
                if (!trace.x || !trace.y) continue;
                for (var i = 0; i < trace.x.length; i++) {
                    var d = new Date(trace.x[i]);
                    if (d < xMin || d > xMax || trace.y[i] == null) continue;
                    if (trace.yaxis === 'y2') {
                        if (trace.y[i] > vMax) vMax = trace.y[i];
                    } else {
                        if (trace.y[i] < yMin) yMin = trace.y[i];
                        if (trace.y[i] > yMax) yMax = trace.y[i];
                    }
                }
            }

            if (yMin !== Infinity && yMax !== -Infinity) {
                var range = yMax - yMin;
                var pad = Math.max(range * 0.08, yMax * 0.02);
                Plotly.relayout(gd, {
                    'yaxis.range': [yMin - pad, yMax + pad],
                    'yaxis2.range': [0, vMax * 1.1]
                }).then(function() { fitting = false; });
                return;
            }
        } catch(e) {}
        fitting = false;
    }

    gd.on('plotly_relayout', function(ed) {
        if (fitting) return;
        setTimeout(autofit, 50);
    });
    setTimeout(autofit, 500);
})();
</script>
