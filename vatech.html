<script>
(function() {
    var gd = document.querySelectorAll('.plotly-graph-div')[0];
    if (!gd) return;
    gd.on('plotly_relayout', function(ed) {
        if (!ed['xaxis.range[0]'] && !ed['xaxis.range']) return;
        var xMin, xMax;
        if (ed['xaxis.range[0]']) {
            xMin = new Date(ed['xaxis.range[0]']);
            xMax = new Date(ed['xaxis.range[1]']);
        } else if (ed['xaxis.range']) {
            xMin = new Date(ed['xaxis.range'][0]);
            xMax = new Date(ed['xaxis.range'][1]);
        } else return;

        var traces = gd.data;
        var yMin = Infinity, yMax = -Infinity;
        var vMin = Infinity, vMax = -Infinity;

        for (var t = 0; t < traces.length; t++) {
            var trace = traces[t];
            if (trace.yaxis === 'y2') {
                for (var i = 0; i < trace.x.length; i++) {
                    var d = new Date(trace.x[i]);
                    if (d >= xMin && d <= xMax && trace.y[i] != null) {
                        if (trace.y[i] < vMin) vMin = trace.y[i];
                        if (trace.y[i] > vMax) vMax = trace.y[i];
                    }
                }
            } else {
                for (var i = 0; i < trace.x.length; i++) {
                    var d = new Date(trace.x[i]);
                    if (d >= xMin && d <= xMax && trace.y[i] != null) {
                        if (trace.y[i] < yMin) yMin = trace.y[i];
                        if (trace.y[i] > yMax) yMax = trace.y[i];
                    }
                }
            }
        }

        if (yMin !== Infinity && yMax !== -Infinity) {
            var pad = (yMax - yMin) * 0.05;
            Plotly.relayout(gd, {
                'yaxis.range': [yMin - pad, yMax + pad],
                'yaxis2.range': vMin !== Infinity ? [0, vMax * 1.1] : undefined
            });
        }
    });
})();
</script>
